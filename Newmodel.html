<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Factory Dashboard - New Model V2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef2f7;
  --ink:#0f172a;
  --muted:#64748b;
  --line:#dbe2ea;
  --card:#ffffff;
  --accent:#2563eb;
  --accent-dark:#1d4ed8;
  --ok:#16a34a;
  --ok-bg:#dcfce7;
  --modify:#d97706;
  --modify-bg:#fef3c7;
  --problem:#dc2626;
  --problem-bg:#fee2e2;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--ink)}

.header{
  background:var(--ink);
  color:#fff;
  padding:18px 28px;
  font-size:21px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.header .sub{font-size:12.5px;font-weight:500;color:#94a3b8;margin-top:2px}

.container{padding:22px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}
@media (max-width:900px){.grid{grid-template-columns:1fr}}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.06);
  border:1px solid var(--line);
}
.card h2{
  margin-bottom:16px;
  font-size:15px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}

.group{margin-bottom:13px}
label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px;color:#334155}
input,select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;
  font-size:13.5px;background:#fbfcfe;color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);
  background:#fff;
}
textarea{height:70px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.required-mark{color:var(--problem);margin-left:2px}
.field-error{font-size:11.5px;color:var(--problem);margin-top:4px;display:none}

.actions{display:flex;gap:8px;margin-top:6px}
button{
  padding:10px 16px;border:none;border-radius:9px;font-weight:700;font-size:13.5px;
  cursor:pointer;transition:transform .08s, opacity .15s;
}
button:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:#f1f5f9;color:#334155}
.btn-secondary:hover{background:#e2e8f0}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
button:disabled{opacity:.55;cursor:not-allowed}

.edit-banner{
  background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:12.5px;font-weight:600;
  padding:8px 10px;border-radius:9px;margin-bottom:12px;display:none;align-items:center;justify-content:space-between;gap:8px;
}
.edit-banner.show{display:flex}
.edit-banner button{padding:4px 8px;font-size:11.5px;background:#fff;color:#1d4ed8;border:1px solid #bfdbfe}

/* layout card */
.layout-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.layout-head h2{margin-bottom:0}
.filter-row{display:flex;gap:8px;align-items:center}
.filter-row select{width:auto;padding:7px 10px;font-size:12.5px}

.summary{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

/* machine overview cards */
.machine-overview{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
  gap:14px;margin-bottom:20px;
}
.overview-card{
  background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.overview-card:hover{
  transform:translateY(-5px);
  box-shadow:0 14px 28px rgba(15,23,42,.12);
  border-color:#c7d2e0;
}
.ov-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ov-name{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:6px}
.ov-count{font-size:11px;color:var(--muted);background:#f1f5f9;padding:2px 8px;border-radius:999px}
.progress-track{height:10px;background:#eef2f7;border-radius:999px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;border-radius:999px;transition:width .5s ease, background-color .3s ease}
.bar-green{background:var(--ok)}
.bar-yellow{background:var(--modify)}
.bar-red{background:var(--problem)}
.ov-pct{font-size:12px;font-weight:700;color:var(--ink);display:flex;justify-content:space-between;align-items:center}
.ov-pct .muted-label{font-weight:500;color:var(--muted);font-size:11px}

.entry-list{
  margin-top:12px;border-top:1px solid var(--line);padding-top:10px;
  max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;
}
.entry-row{
  border:1px solid var(--line);border-left:3px solid transparent;border-radius:9px;
  padding:10px 11px;background:#fbfcfe;
  transition:transform .15s ease, box-shadow .15s ease, background-color .15s ease;
}
.entry-row:hover{
  transform:translateX(2px);
  background:#fff;
  box-shadow:0 4px 12px rgba(15,23,42,.08);
}
.entry-row.ok{border-left-color:var(--ok)}
.entry-row.modify{border-left-color:var(--modify)}
.entry-row.problem{border-left-color:var(--problem)}
.entry-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
.entry-model{font-size:13px;font-weight:700;margin-bottom:4px}
.entry-empty{font-size:12px;color:var(--muted);text-align:center;padding:14px 4px}
.entry-actions{display:flex;gap:6px;margin-top:8px}
.entry-actions button{padding:5px 9px;font-size:11px;border-radius:7px}

.pill{
  font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;display:flex;gap:6px;align-items:center;
}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.modify{background:var(--modify-bg);color:var(--modify)}
.pill.problem{background:var(--problem-bg);color:var(--problem)}
.pill.total{background:#f1f5f9;color:#334155}

.line-tag{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.status-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
  padding:3px 9px;border-radius:999px;margin-bottom:8px;
}
.status-badge.ok{background:var(--ok-bg);color:var(--ok)}
.status-badge.modify{background:var(--modify-bg);color:var(--modify)}
.status-badge.problem{background:var(--problem-bg);color:var(--problem)}
.meta-line{font-size:11.5px;color:var(--muted);margin-bottom:2px}
.card-actions{display:flex;gap:6px;margin-top:10px}
.card-actions button{padding:6px 10px;font-size:11.5px;border-radius:7px}

.empty-state{
  grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted);
}
.empty-state .big{font-size:34px;margin-bottom:8px}

.loading-row{grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);font-size:13.5px}
.toast{
  position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:11px 18px;
  border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.2);
  opacity:0;transform:translateY(10px);transition:opacity .2s, transform .2s;pointer-events:none;z-index:999;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--problem)}
.toast.success{background:var(--ok)}
</style>
</head>
<body>

<div class="header">
  <div>
    <div>🏭 Factory Dashboard — New Model V2</div>
    <div class="sub">Production line model status tracker</div>
  </div>
</div>

<div class="container">
<div class="grid">

  <div class="card">
    <h2>📋 New Model Information</h2>

    <div class="edit-banner" id="editBanner">
      <span>✏️ Editing record</span>
      <button onclick="cancelEdit()">Cancel</button>
    </div>

    <div class="group">
      <label>Model Name<span class="required-mark">*</span></label>
      <input id="modelName" placeholder="e.g. NM-2024-A">
      <div class="field-error" id="err-modelName">Please enter a model name.</div>
    </div>

    <div class="row2">
      <div class="group">
        <label>Production Line</label>
        <select id="line">
          <option>HMR</option><option>GMR</option><option>TMR1</option><option>TMR2</option>
          <option>MIR</option><option>ISR</option><option>SP</option><option>HS</option>
        </select>
      </div>
      <div class="group">
        <label>Machine</label>
        <select id="machine">
          <option>Stator clip assembly jig</option>
           <option>Clamp assembly jig</option>
           <option>Rotator handling jig</option>
           <option>Barcode pasting jig</option>
            <option>Barcode feeder</option>
            <option>Harness length measurement jig</option>
            <option>Window feeder</option>
            <option>Neutral window pasting jig</option>
          <option>Lcc inspection</option>
          <option>Function tester</option>
          <option>Electric tester</option>
          <option>Final tester</option>
        </select>
      </div>
    </div>

    <div class="group">
      <label>Status</label>
      <select id="status">
        <option value="OK">🟢 New</option>
        <option value="Modify">🟡 Modified</option>
        <option value="Problem">🔴 Problem</option>
      </select>
    </div>

    <div class="row2">
      <div class="group">
        <label>Start Date</label>
        <input type="date" id="startDate">
      </div>
      <div class="group">
        <label>Finish Date</label>
        <input type="date" id="finishDate">
      </div>
    </div>

    <div class="group"><label>PIC</label><input id="pic" placeholder="Person in charge"></div>
    <div class="group"><label>Remark</label><textarea id="remark" placeholder="Notes..."></textarea></div>
    <div class="group">
      <label>Drawing</label>
      <input type="file" id="drawing">
    </div>

    <div class="actions">
      <button class="btn-primary" id="saveBtn" onclick="saveModel()">💾 Save</button>
      <button class="btn-secondary" onclick="clearForm()">🧹 Clear</button>
    </div>
  </div>

  <div class="card">
    <div class="layout-head">
      <h2>🗺️ Production Line Layout</h2>
      <div class="filter-row">
        <label style="margin:0">Filter:</label>
        <select id="filterLine" onchange="render()">
          <option value="">All lines</option>
          <option>HMR</option><option>GMR</option><option>TMR1</option><option>TMR2</option>
          <option>MIR</option><option>ISR</option><option>SP</option><option>HS</option>
        </select>
      </div>
    </div>

    <div id="machineOverview" class="machine-overview"></div>

    <div class="summary" id="summary"></div>
  </div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbych87C6rFEkEy5GYxec76Pk9l8XkKp8gl5mjONZvvZkzmyuZ06divjQv_AK9wy3FvB/exec";
const MACHINES = [ "Stator clip assembly jig", "Clamp assembly jig", "Rotator handling jig", "Barcode pasting jig", "Barcode feeder", "Harness length measurement jig", "Window feeder","Neutral window pasting jig", "Lcc inspection", "function tester", "Electric tester", "Final tester"];
let models = [];
let editId = "";

/* ---------- progress helper ---------- */
// Progress = how far along today is between startDate and finishDate.
function calcProgress(startDate, finishDate){
  if (!startDate || !finishDate) return null;
  const start = new Date(startDate).getTime();
  const finish = new Date(finishDate).getTime();
  if (isNaN(start) || isNaN(finish) || finish <= start) return null;

  const now = Date.now();
  let pct = ((now - start) / (finish - start)) * 100;
  return Math.max(0, Math.min(100, pct));
}

function progressColorClass(pct){
  if (pct < 20) return "bar-red";
  if (pct < 50) return "bar-yellow";
  return "bar-green";
}

function entryRowHtml(m){
  const cls = m.status === "Modify" ? "modify" : m.status === "Problem" ? "problem" : "ok";
  const statusIcon = cls === "ok" ? "🟢" : cls === "modify" ? "🟡" : "🔴";

  return `
    <div class="entry-row ${cls}">
      <div class="entry-top">
        <span class="line-tag">${escapeHtml(m.line || "—")}</span>
        <span class="status-badge ${cls}">${statusIcon} ${escapeHtml(m.status || "")}</span>
      </div>
      <div class="entry-model">${escapeHtml(m.model || "Untitled model")}</div>
      ${m.pic ? `<div class="meta-line">👤 ${escapeHtml(m.pic)}</div>` : ""}
      ${(m.startDate || m.finishDate) ? `<div class="meta-line">📅 ${escapeHtml(m.startDate||"?")} → ${escapeHtml(m.finishDate||"?")}</div>` : ""}
      ${m.drawingUrl ? `<div class="meta-line">📎 <a href="${escapeHtml(m.drawingUrl)}" target="_blank" rel="noopener">${escapeHtml(m.drawingName || "Drawing")}</a></div>` : ""}
      <div class="entry-actions">
        <button class="btn-secondary" onclick="editModel('${m.id}')">✏️ Edit</button>
        <button class="btn-ghost" onclick="deleteModel('${m.id}')">🗑️ Delete</button>
      </div>
    </div>
  `;
}

/* ---------- machine overview (card per machine, with its records nested inside) ---------- */
function renderMachineOverview(filtered){
  const container = document.getElementById("machineOverview");
  container.innerHTML = "";

  MACHINES.forEach(machine => {
    const records = filtered.filter(m => m.machine === machine);
    const pcts = records.map(r => calcProgress(r.startDate, r.finishDate)).filter(p => p !== null);
    const hasProgress = pcts.length > 0;
    const avgPct = hasProgress ? pcts.reduce((a,b) => a+b, 0) / pcts.length : 0;
    const colorClass = progressColorClass(avgPct);

    const entriesHtml = records.length
      ? records.map(entryRowHtml).join("")
      : `<div class="entry-empty">No records yet for this machine.</div>`;

    const card = document.createElement("div");
    card.className = "overview-card";
    card.innerHTML = `
      <div class="ov-head">
        <div class="ov-name">⚙️ ${escapeHtml(machine)}</div>
        <div class="ov-count">${records.length} record${records.length !== 1 ? "s" : ""}</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${colorClass}" style="width:${hasProgress ? avgPct : 0}%"></div>
      </div>
      <div class="ov-pct">
        <span>${hasProgress ? Math.round(avgPct) + "% complete" : "—"}</span>
        ${!hasProgress ? `<span class="muted-label">${records.length ? "no dates set" : "no records"}</span>` : ""}
      </div>
      <div class="entry-list">${entriesHtml}</div>
    `;
    container.appendChild(card);
  });
}

/* ---------- toast ---------- */
function showToast(msg, type=""){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove("show"), 2800);
}

/* ---------- rendering ---------- */
function render(){
  const filterLine = document.getElementById("filterLine").value;
  const filtered = filterLine ? models.filter(m => m.line === filterLine) : models;

  renderMachineOverview(filtered);

  // summary pills
  const counts = { OK:0, Modify:0, Problem:0 };
  filtered.forEach(m => { if (counts[m.status] !== undefined) counts[m.status]++; });
  document.getElementById("summary").innerHTML = `
    <span class="pill total">Total: ${filtered.length}</span>
    <span class="pill ok">🟢 OK: ${counts.OK}</span>
    <span class="pill modify">🟡 Modify: ${counts.Modify}</span>
    <span class="pill problem">🔴 Problem: ${counts.Problem}</span>
  `;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ---------- save / update ---------- */
function validateForm(){
  const modelName = document.getElementById("modelName").value.trim();
  const errEl = document.getElementById("err-modelName");
  if (!modelName){
    errEl.style.display = "block";
    document.getElementById("modelName").focus();
    return false;
  }
  errEl.style.display = "none";
  return true;
}

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]); // strip data: prefix
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.readAsDataURL(file);
  });
}

async function uploadDrawingFile(file){
  const base64 = await fileToBase64(file);
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "uploadDrawing",
      base64: base64,
      fileName: file.name,
      mimeType: file.type
    })
  });
  if (!res.ok) throw new Error("Upload request failed: " + res.status);
  const data = await res.json();
  if (!data.success) throw new Error(data.message || "Upload failed");
  return { drawingName: data.drawingName, drawingUrl: data.drawingUrl };
}

async function saveModel(){
  if (!validateForm()) return;

  const m = {
    model: document.getElementById("modelName").value.trim(),
    line: document.getElementById("line").value,
    machine: document.getElementById("machine").value,
    status: document.getElementById("status").value,
    start: document.getElementById("startDate").value,
    finish: document.getElementById("finishDate").value,
    pic: document.getElementById("pic").value.trim(),
    remark: document.getElementById("remark").value.trim()
  };

  let action = "saveNewModel";
  let id = Date.now();
  if (editId !== ""){
    action = "updateNewModel";
    id = editId;
  }

  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;

  // upload drawing first, if a new file was chosen
  let drawingName = "";
  let drawingUrl = "";
  const fileInput = document.getElementById("drawing");
  const file = fileInput.files[0];

  try{
    if (file){
      saveBtn.textContent = "Uploading file...";
      const uploaded = await uploadDrawingFile(file);
      drawingName = uploaded.drawingName;
      drawingUrl = uploaded.drawingUrl;
    }

    saveBtn.textContent = "Saving...";

    const params = new URLSearchParams({
      action, id,
      model: m.model, line: m.line, machine: m.machine, status: m.status,
      startDate: m.start, finishDate: m.finish, pic: m.pic, remark: m.remark,
      drawingName, drawingUrl
    });

    const res = await fetch(API_URL + "?" + params);
    if (!res.ok) throw new Error("Request failed: " + res.status);
    const data = await res.json();
    if (!data.success) throw new Error(data.message || "Save failed");

    showToast(editId !== "" ? "Updated successfully" : "Saved successfully", "success");
    clearForm();
    await loadModels();
  } catch(err){
    console.error(err);
    showToast(err.message, "error");
  } finally{
    saveBtn.disabled = false;
    saveBtn.textContent = "💾 Save";
  }
}

/* ---------- edit ---------- */
function editModel(id){
  const model = models.find(x => String(x.id) === String(id));
  if (!model) return;

  editId = id;
  document.getElementById("modelName").value = model.model || "";
  document.getElementById("line").value = model.line || "HMR";
  document.getElementById("machine").value = model.machine || "Pigtail welding";
  document.getElementById("status").value = model.status || "OK";
  document.getElementById("startDate").value = model.startDate || "";
  document.getElementById("finishDate").value = model.finishDate || "";
  document.getElementById("pic").value = model.pic || "";
  document.getElementById("remark").value = model.remark || "";

  document.getElementById("editBanner").classList.add("show");
  document.getElementById("saveBtn").textContent = "💾 Update";
  document.querySelector(".card").scrollIntoView({ behavior: "smooth", block: "start" });
}

function cancelEdit(){
  editId = "";
  document.getElementById("editBanner").classList.remove("show");
  document.getElementById("saveBtn").textContent = "💾 Save";
  clearFormFields();
}

/* ---------- clear ---------- */
function clearFormFields(){
  ["modelName","pic","remark","startDate","finishDate"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("status").selectedIndex = 0;
  document.getElementById("machine").selectedIndex = 0;
  document.getElementById("drawing").value = "";
  document.getElementById("err-modelName").style.display = "none";
}

function clearForm(){
  clearFormFields();
  editId = "";
  document.getElementById("editBanner").classList.remove("show");
  document.getElementById("saveBtn").textContent = "💾 Save";
}

/* ---------- load ---------- */
async function loadModels(){
  const container = document.getElementById("machineOverview");
  container.innerHTML = `<div class="loading-row">Loading records...</div>`;

  try{
    const response = await fetch(API_URL + "?action=loadNewModel");
    if (!response.ok) throw new Error("Server returned " + response.status);
    const data = await response.json();
    if (Array.isArray(data)){
      models = data;
    } else if (data && data.success === false){
      throw new Error(data.message || "Failed to load data");
    } else {
      models = data.data || [];
    }
    render();
  } catch(err){
    console.error(err);
    container.innerHTML = `<div class="empty-state"><div class="big">⚠️</div><div>Couldn't load data: ${escapeHtml(err.message)}</div></div>`;
    showToast("Failed to load data", "error");
  }
}

/* ---------- delete ---------- */
async function deleteModel(id){
  if (!confirm("Delete this record?")) return;

  const params = new URLSearchParams({ action: "deleteNewModel", id });
  try{
    const res = await fetch(API_URL + "?" + params);
    if (!res.ok) throw new Error("Request failed: " + res.status);
    const data = await res.json();
    if (!data.success) throw new Error(data.message || "Delete failed");
    showToast("Deleted", "success");
    await loadModels();
  } catch(err){
    console.error(err);
    showToast(err.message, "error");
  }
}

loadModels();
</script>
</body>
</html>
